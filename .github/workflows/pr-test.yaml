name: Run Tests
on: [pull_request]

jobs:
  test-cases:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout repo
       uses: actions/checkout@v6

     - name: Install nasm
       uses: ilammy/setup-nasm@v1

     - name: Setup Go
       uses: actions/setup-go@v6
       with:
         go-version: '1.26.x'

     - name: Run the golang tests
       run: go test ./...

     - name: Run the functional tests
       run: make test

     - name: See our sizes
       run: find . -type f -executable  -exec ls -l {} \;

